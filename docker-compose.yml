services:
  mongodb:
    image: mongo:7
    container_name: jira-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: project_management
    volumes:
      - mongodb_data:/data/db
      - ./validation.js:/docker-entrypoint-initdb.d/1-validation.js:ro
      - ./data.js:/docker-entrypoint-initdb.d/2-data.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "admin", "--password", "secret", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build: .
    container_name: jira-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      JWT_SECRET: dev-secret-key
      LOG_LEVEL: information
      MONGODB_URI: mongodb://admin:secret@mongodb:27017/project_management?authSource=admin
      MONGODB_DATABASE: project_management
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data: