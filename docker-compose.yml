version: '3.8'

services:
  jira:
    build: .
    container_name: jira-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jira-net

networks:
  jira-net:
    driver: bridge